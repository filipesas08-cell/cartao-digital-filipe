<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filipe Oliveira — Soluções Digitais com IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0b0d;
      --surface: #111316;
      --border: rgba(108,125,140,0.2);
      --silver: #eef2f5;
      --silver-dim: #97a1ab;
      --silver-accent: #6b7681;
      --muted: #555f68;
    }

    body {
      background: var(--bg);
      color: var(--silver);
      font-family: "Jost", -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      padding: 44px 32px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      background: radial-gradient(120% 120% at 50% 10%, #16181c 0%, #0a0b0d 65%);
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .header::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--silver-accent), transparent);
    }

    .wolf-logo {
      width: 110px;
      height: auto;
      margin-bottom: 28px;
      display: block;
    }

    .name {
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 0.28em;
      color: var(--silver);
      padding-left: 0.28em;
      margin-bottom: 14px;
    }

    .divider {
      width: 56px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--silver-accent), transparent);
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.32em;
      color: var(--silver-dim);
      padding-left: 0.32em;
    }

    .section {
      padding: 26px 32px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .services {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .service-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      font-weight: 300;
      color: #b0bcc6;
      letter-spacing: 0.02em;
    }

    .service-item::before {
      content: "";
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--silver-accent);
      flex-shrink: 0;
    }

    .contacts {
      padding: 26px 32px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--silver);
      font-family: "Jost", sans-serif;
      font-size: 13px;
      font-weight: 300;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
    }

    .btn:last-child { margin-bottom: 0; }

    .btn:hover {
      background: rgba(108,125,140,0.1);
      border-color: var(--silver-accent);
    }

    .btn-icon {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      background: rgba(108,125,140,0.1);
      flex-shrink: 0;
    }

    .btn-content { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .btn-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; }
    .btn-value { font-size: 12px; word-break: break-all; }

    .btn-wpp { border-color: rgba(37,211,102,0.2); }
    .btn-wpp .btn-icon { background: rgba(37,211,102,0.08); }
    .btn-wpp:hover { background: rgba(37,211,102,0.06); border-color: rgba(37,211,102,0.4); }

    .footer {
      padding: 14px 32px;
      border-top: 1px solid var(--border);
      text-align: center;
    }

    .footer span {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .footer strong {
      color: var(--silver-accent);
      font-weight: 300;
    }
  </style>
</head>
